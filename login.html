<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | RECIPEZ</title>
  <!-- Lab 02: External CSS -->
  <link rel="stylesheet" href="css/styles.css?v=10">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Lab 02: Embedded CSS (Step 2) -->
  <style>
    /* Lab 02: Embedded CSS block */
    .login-info { font-size: 13px; color: #5a7a5a; background: #e8f5e9; border: 1px solid #c8e6c9; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }
    .login-info b { color: #1b5e20; }
    .or-divider { text-align: center; color: #aaa; margin: 16px 0; font-size: 13px; position: relative; }
    .or-divider::before, .or-divider::after { content: ""; position: absolute; top: 50%; width: 42%; height: 1px; background: #e0e0e0; }
    .or-divider::before { left: 0; } .or-divider::after { right: 0; }
  </style>
</head>
<body>

<!-- Login page uses full-screen layout - no navbar needed -->
<div class="login-page">
  <div class="login-card">

    <!-- Logo (Lab 02: inline CSS on span) -->
    <div class="logo">RECIPE<span>Z</span></div>
    <p class="tagline">Sign in to share and discover recipes</p>

    
    <div class="login-info">
    </div>

    <!-- LOGIN FORM (Lab 01: HTML input elements) -->
    <!-- Lab 03: JS validation on submit -->

    <!-- Username field -->
    <div class="form-group">
      <!-- Lab 02: inline CSS on label -->
      <label for="loginUser" style="font-size: 14px; font-weight: 600; color: #5a7a5a;">Username</label>
      <!-- Lab 01: input tag, Lab 03: onkeydown event -->
      <input type="text" id="loginUser"
             placeholder="Enter your username"
             onkeydown="if(event.key==='Enter') validateLogin()">
    </div>

    <!-- Password field -->
    <div class="form-group">
      <label for="loginPass" style="font-size: 14px; font-weight: 600; color: #5a7a5a;">Password</label>
      <div class="password-wrap">
        <input type="password" id="loginPass"
               placeholder="Enter your password"
               onkeydown="if(event.key==='Enter') validateLogin()">
        <!-- Lab 03: onclick event to toggle password visibility -->
        <button class="toggle-pwd" id="togglePwdBtn" onclick="togglePassword()" type="button">👁</button>
      </div>
    </div>

    <!-- Error message (shown by JS - Lab 04: if statement) -->
    <div class="error-msg" id="loginError" style="margin-bottom:10px;"></div>

    <!-- SUBMIT BUTTON (Lab 03: onclick, Lab 04: if-else validation) -->
    <button class="btn btn-primary" onclick="validateLogin()" style="width:100%; font-size:17px; padding:16px; margin-top:4px;">
      🔐 Login
    </button>

    <div class="or-divider">or</div>

    <!-- Sign Up link -->
    <div style="text-align:center; margin:20px 0 10px;">
      <p style="color:#5a7a5a; font-size:14px; margin-bottom:10px;">Don't have an account?</p>
      <a href="register.html" class="btn btn-primary" style="width:100%; display:block; margin-bottom:10px;">
        ✍️ Sign Up / Register
      </a>
    </div>

    <!-- Guest access -->
    <a href="index.html" class="btn btn-outline" style="width:100%; text-align:center; display:block; color:#2e7d32; border-color:#2e7d32;">
      👀 Browse as Guest
    </a>

    <!-- Back link (Lab 01: hyperlink) -->
    <p style="text-align:center; margin-top:20px; font-size:13px; color:#888;">
      <a href="index.html" style="color:#2e7d32;">← Back to Home</a>
    </p>

  </div>
</div>

<!-- Lab 02: External JS -->
<script src="js/main.js?v=10"></script>
<script>
  /* ============================================================
     LOGIN VALIDATION
     Lab 03: window.alert() for wrong login
     Lab 04: if-else comparison operators
     Lab 06: Object property access (users object)
     Project: Redirect to home on success
     ============================================================ */

  // Override validateLogin with enhanced UI version
  function validateLogin() {
    const username = document.getElementById("loginUser").value.trim(); // Lab 06: string trim
    const password = document.getElementById("loginPass").value;
    const errEl    = document.getElementById("loginError");

    // Lab 04: if - check empty fields
    if (!username || username.length === 0) {  // Lab 04: if, comparison operator
      errEl.textContent = "⚠️ Please enter your username.";
      errEl.classList.add("show");
      return false;
    }

    // Lab 04: if - check password empty
    if (!password || password.length === 0) {  // Lab 04: if
      errEl.textContent = "⚠️ Please enter your password.";
      errEl.classList.add("show");
      return false;
    }

    errEl.classList.remove("show");

    // Lab 06: Object property access
    const storedPass = users[username];        // Lab 06: object access

    // Lab 04: if-else
    if (storedPass !== undefined && storedPass === password) {  // Lab 04: if, === operator
      console.log("✅ Login success: " + username); // Lab 03: console.log
      // Lab 03: window.alert
      window.alert("✅ Welcome back, " + username + "! Redirecting to Home...");
      sessionStorage.setItem("user", username);
      // Project: redirect to home on success
      window.location.href = "index.html";
    } else {
      // Lab 03: window.alert for wrong login (user requirement)
      document.getElementById("loginPass").value = ""; // clear password
      document.getElementById("loginPass").focus();
    }
    return false;
  }
</script>
</body>
</html>
